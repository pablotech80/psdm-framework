name: PSDM

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-framework:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Validate CLI package
        run: npm run release:check
